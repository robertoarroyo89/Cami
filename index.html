<title>Cami — Meditación con tu capibara</title>
<meta name="description" content="Tu compañero capibara para encontrar calma cada día. Meditación guiada con respiración, sonidos ambientales y pensamientos a medida." />

<style>
  /* Inline critical: prevent flash of wrong height before JS runs */
  html, body { margin:0; padding:0; overflow:hidden; background:#2d4a47; }
  #app { height: 100vh; }
</style>

<script>
  // Measure real viewport before first paint — critical for iOS PWA
  function setAppHeight() {
    const h = window.innerHeight;
    document.documentElement.style.setProperty('--app-h', h + 'px');
    document.documentElement.style.height = h + 'px';
    document.body.style.height = h + 'px';
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 200));
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />
</head>

<script src="js/audio.js"></script>
<script src="js/storage.js"></script>
<script src="js/screens.js"></script>
<script src="js/app.js"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
